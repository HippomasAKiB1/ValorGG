<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCT Tournament Bracket Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,700;0,800;0,900;1,900&family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="bracket.css">
</head>
<body>

    <!-- Left sidebar containing WC Logo and Jett -->
    <div class="sidebar left">
        <img src="/assets/Warcities logo.png" class="sidebar-logo" alt="WarCities Logo" onerror="this.src='/assets/Warcities logo.png'">
        <img src="/assets/agent/jett.webp" class="sidebar-agent-art" alt="Jett">
    </div>

    <!-- Right sidebar containing Valorant Logo and Reyna -->
    <div class="sidebar right">
        <img src="/assets/Valorant Logo.png" class="sidebar-logo" alt="Valorant Logo" onerror="this.src='/assets/Valorant Logo.png'">
        <img src="/assets/agent/reyna.webp" class="sidebar-agent-art" alt="Reyna">
    </div>

    <!-- Screen Accent Brackets -->
    <div class="corner-accent tl">
        <svg width="100%" height="100%" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3,36 L3,3 L36,3" stroke="#ff4655" stroke-width="3.5" stroke-linecap="square"/>
            <path d="M9,44 L9,9 L44,9" stroke="rgba(255, 70, 85, 0.4)" stroke-width="1.5" stroke-linecap="square"/>
            <rect x="8" y="8" width="6" height="6" fill="#ece81a" rx="1"/>
            <rect x="2" y="2" width="2" height="2" fill="#ece81a"/>
            <line x1="3" y1="3" x2="22" y2="22" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="2 2"/>
            <circle cx="22" cy="22" r="2" fill="#ece81a"/>
        </svg>
    </div>
    <div class="corner-accent tr">
        <svg width="100%" height="100%" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3,36 L3,3 L36,3" stroke="#ff4655" stroke-width="3.5" stroke-linecap="square"/>
            <path d="M9,44 L9,9 L44,9" stroke="rgba(255, 70, 85, 0.4)" stroke-width="1.5" stroke-linecap="square"/>
            <rect x="8" y="8" width="6" height="6" fill="#ece81a" rx="1"/>
            <rect x="2" y="2" width="2" height="2" fill="#ece81a"/>
            <line x1="3" y1="3" x2="22" y2="22" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="2 2"/>
            <circle cx="22" cy="22" r="2" fill="#ece81a"/>
        </svg>
    </div>
    <div class="corner-accent bl">
        <svg width="100%" height="100%" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3,36 L3,3 L36,3" stroke="#ff4655" stroke-width="3.5" stroke-linecap="square"/>
            <path d="M9,44 L9,9 L44,9" stroke="rgba(255, 70, 85, 0.4)" stroke-width="1.5" stroke-linecap="square"/>
            <rect x="8" y="8" width="6" height="6" fill="#ece81a" rx="1"/>
            <rect x="2" y="2" width="2" height="2" fill="#ece81a"/>
            <line x1="3" y1="3" x2="22" y2="22" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="2 2"/>
            <circle cx="22" cy="22" r="2" fill="#ece81a"/>
        </svg>
    </div>
    <div class="corner-accent br">
        <svg width="100%" height="100%" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M3,36 L3,3 L36,3" stroke="#ff4655" stroke-width="3.5" stroke-linecap="square"/>
            <path d="M9,44 L9,9 L44,9" stroke="rgba(255, 70, 85, 0.4)" stroke-width="1.5" stroke-linecap="square"/>
            <rect x="8" y="8" width="6" height="6" fill="#ece81a" rx="1"/>
            <rect x="2" y="2" width="2" height="2" fill="#ece81a"/>
            <line x1="3" y1="3" x2="22" y2="22" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="2 2"/>
            <circle cx="22" cy="22" r="2" fill="#ece81a"/>
        </svg>
    </div>

    <div class="bracket-wrapper">
        <!-- Top Header Banner (Dynamic via WebSocket) -->
        <header class="winner-header animate-header">
            <h1 class="v-event" id="header-tournament">WARCITIES://VALORANT PRO SERIES</h1>
            <div class="header-scene">PLAYOFFS BRACKET</div>
        </header>

        <!-- Giant Rotated Watermark Background Text -->
        <div class="bracket-watermark">PLAYOFFS</div>

        <!-- Dynamic SVG Connector Lines Layer (Draws glowing paths between match cards) -->
        <svg class="connector-svg-layer" id="connector-svg-layer" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="connector-grad" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#00f3c6" />
                    <stop offset="100%" stop-color="#ece81a" />
                </linearGradient>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="3" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>
            <!-- Generated dynamically by bracket.js -->
        </svg>

        <!-- Central Custom Bracket Board -->
        <main class="bracket-board" id="bracket-board">
            <!-- Dynamically populated round columns containing VCT styled match cards -->
        </main>

        <!-- Scrolling sponsors logo bar -->
        <div class="bottom-partners">
            <img src="/assets/Warcities logo.png" class="partner-logo" alt="Sponsor">
            <img src="/assets/Valorant Logo.png" class="partner-logo" alt="Sponsor">
            <img src="/assets/wvps logo.png" class="partner-logo" alt="Sponsor">
        </div>
    </div>

    <!-- Live WebSocket Bridge & Bracket Engine -->
    <script src="bracket.js"></script>
</body>
</html>
