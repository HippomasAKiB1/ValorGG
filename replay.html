<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VCT Replay Overlay // Official VCT Style</title>
    <!-- Google Fonts: Barlow Condensed for the exact VCT heavy italic font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,800;1,900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="replay.css">
</head>
<body>

    <div class="replay-wrapper" id="replay-wrapper">
        <!-- CRT Scanline & Screen Vignette Overlay -->
        <div class="replay-scanlines"></div>
        <div class="replay-vignette"></div>

        <!-- Single Unified Full-Screen SVG for perfect vector seams & clean VCT shapes -->
        <svg class="vct-vector-canvas" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
            <!-- Left Frame Group (12px thin borders with chamfers and notches) -->
            <g class="vct-group-left">
                <path class="vct-frame-shape" d="M 450,2 L 438,14 L 180,14 L 168,26 L 87,26 L 75,14 L 14,14 L 14,120 L 26,132 L 26,208 L 14,220 L 14,860 L 26,872 L 26,948 L 14,960 L 14,1066 L 75,1066 L 87,1054 L 168,1054 L 180,1066 L 450,1066 L 438,1078 L 14,1078 L 2,1066 L 2,14 L 14,2 Z" />
            </g>
            
            <!-- Right Frame Group (Path + Text animated together as a single unit - scaled down REPLAY console) -->
            <g class="vct-group-right">
                <path class="vct-frame-shape" d="M 1470,2 L 1906,2 L 1918,14 L 1918,120 L 1906,132 L 1906,208 L 1918,220 L 1918,960 L 1918,1078 L 1900,1078 L 1900,1066 L 1870,1066 L 1870,1078 L 418,1078 L 418,1066 L 1508,1066 L 1580,960 L 1605,960 L 1605,975 L 1635,975 L 1635,960 L 1906,960 L 1906,220 L 1894,208 L 1894,132 L 1906,120 L 1906,14 L 1845,14 L 1833,26 L 1752,26 L 1740,14 L 1500,14 L 1470,2 Z" />
                <text x="1750" y="1046" class="vct-text-replay">REPLAY</text>
            </g>
        </svg>
    </div>

    <script src="replay.js"></script>
</body>
</html>
