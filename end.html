<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1920, height=1080">
    <title>VCT Intermissions - Stream Ending</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Rajdhani:wght@600;700&family=Barlow+Condensed:ital,wght@0,600;0,700;0,800;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent-purple: #9b51e0;
            --accent-cyan: #00f3c6;
            --accent-gold: #ece81a;
            --bg-dark-glass: rgba(15, 8, 28, 0.75);
            --font-outfit: 'Outfit', sans-serif;
            --font-rajdhani: 'Rajdhani', sans-serif;
            --font-barlow: 'Barlow Condensed', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background-color: transparent !important;
            color: #ffffff;
            font-family: var(--font-outfit);
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            position: relative;
        }

        /* ── Cybernetic Tech Grid ── */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(155, 81, 224, 0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(155, 81, 224, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 1;
            pointer-events: none;
        }

        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(155, 81, 224, 0.08) 0%, transparent 65%);
            z-index: 1;
            pointer-events: none;
        }

        /* ── Left & Right Vertical Accent Banners ── */
        .sidebar {
            position: absolute;
            top: 0;
            width: 220px;
            height: 1080px;
            background: linear-gradient(to bottom, rgba(20, 10, 36, 0.82) 0%, rgba(10, 5, 20, 0.88) 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
            z-index: 50;
            overflow: hidden;
        }

        .sidebar.left {
            left: 0;
            border-right: 2px solid rgba(155, 81, 224, 0.35);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .sidebar.right {
            right: 0;
            border-left: 2px solid rgba(155, 81, 224, 0.35);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .sidebar-logo {
            width: 140px;
            height: 60px;
            object-fit: contain;
            z-index: 100;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5));
        }

        .sidebar-agent-art {
            position: absolute;
            bottom: -20px;
            height: 80%;
            width: auto;
            object-fit: contain;
            opacity: 0.16;
            mix-blend-mode: screen;
            filter: drop-shadow(0 0 25px rgba(155, 81, 224, 0.4)) saturate(0.8) brightness(0.9);
            pointer-events: none;
            z-index: 2;
            transition: opacity 0.3s ease;
        }
        .sidebar.left .sidebar-agent-art { left: 50%; transform: translateX(-50%); }
        .sidebar.right .sidebar-agent-art { left: 50%; transform: translateX(-50%) scaleX(-1); }

        /* ── Screen Accent Brackets (All 4 Corners of Main Viewport) ── */
        .corner-accent {
            position: absolute;
            width: 60px;
            height: 60px;
            z-index: 1000;
            pointer-events: none;
            filter: drop-shadow(0 0 10px rgba(155, 81, 224, 0.35));
        }
        .corner-accent.tl { left: 240px; top: 30px; }
        .corner-accent.tr { right: 240px; top: 30px; transform: scaleX(-1); }
        .corner-accent.bl { left: 240px; bottom: 30px; transform: scaleY(-1); }
        .corner-accent.br { right: 240px; bottom: 30px; transform: scale(-1); }

        /* ── Center Content Section ── */
        .center-content {
            position: absolute;
            left: 220px;
            width: 1480px;
            height: 1080px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding-top: 100px;
            z-index: 10;
        }

        .tournament-logo-large {
            height: 220px;
            max-width: 600px;
            object-fit: contain;
            filter: drop-shadow(0 0 25px rgba(155, 81, 224, 0.45));
            margin-bottom: 30px;
            animation: logoGlow 4s infinite ease-in-out;
        }

        /* ── Stream Ended Hero Typography ── */
        .text-stream {
            font-family: var(--font-barlow);
            font-size: 145px;
            font-weight: 800;
            font-style: italic;
            color: #ffffff;
            -webkit-text-stroke: 2px #000000;
            text-shadow: 6px 6px 0px rgba(0, 0, 0, 0.95);
            letter-spacing: 4px;
            line-height: 1;
            text-transform: uppercase;
        }

        .text-state {
            font-family: var(--font-barlow);
            font-size: 105px;
            font-weight: 800;
            font-style: italic;
            color: transparent;
            -webkit-text-stroke: 3px #ffffff;
            text-shadow: 4px 4px 15px rgba(155, 81, 224, 0.25);
            letter-spacing: 4px;
            line-height: 0.9;
            text-transform: uppercase;
            margin-bottom: 45px;
        }

        /* Skewed goodbye box */
        .goodbye-box {
            background: var(--bg-dark-glass);
            border: 1.5px solid rgba(236, 232, 26, 0.35);
            border-radius: 16px;
            padding: 22px 40px;
            width: 720px;
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 48px rgba(0, 0, 0, 0.5),
                        0 0 30px rgba(236, 232, 26, 0.05);
            position: relative;
            text-align: center;
            margin-bottom: 40px;
        }

        .goodbye-box::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
        }

        /* Glass Box Corner Brackets */
        .box-corner {
            position: absolute;
            width: 14px;
            height: 14px;
            z-index: 15;
            pointer-events: none;
            filter: drop-shadow(0 0 4px rgba(236, 232, 26, 0.6));
        }
        .box-corner.tl { left: -3px; top: -3px; }
        .box-corner.tr { right: -3px; top: -3px; transform: scaleX(-1); }
        .box-corner.bl { left: -3px; bottom: -3px; transform: scaleY(-1); }
        .box-corner.br { right: -3px; bottom: -3px; transform: scale(-1); }

        .goodbye-text {
            font-family: var(--font-rajdhani);
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3.5px;
            color: #ffffff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.25);
            text-transform: uppercase;
        }

        /* ── Social Card Grid ── */
        .socials-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            width: 100%;
        }

        .social-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 180px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            backdrop-filter: blur(10px);
        }

        .social-card:hover {
            background: rgba(0, 243, 198, 0.04);
            border-color: rgba(0, 243, 198, 0.3);
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 243, 198, 0.08);
        }

        .social-card svg {
            width: 32px;
            height: 32px;
            fill: var(--accent-cyan);
            filter: drop-shadow(0 0 4px rgba(0, 243, 198, 0.4));
        }

        .social-title {
            font-family: var(--font-rajdhani);
            font-size: 11px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 1.8px;
            text-transform: uppercase;
        }

        .social-handle {
            font-family: var(--font-outfit);
            font-size: 14px;
            font-weight: 600;
            color: #ffffff;
        }

        /* ── Bottom scrolling partners strip ── */
        .bottom-partners {
            position: absolute;
            bottom: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            opacity: 0.3;
            z-index: 5;
        }

        .partner-logo {
            height: 28px;
            object-fit: contain;
            filter: grayscale(1) brightness(2);
        }

        @keyframes logoGlow {
            0%, 100% { filter: drop-shadow(0 0 25px rgba(155, 81, 224, 0.4)); }
            50% { filter: drop-shadow(0 0 35px rgba(155, 81, 224, 0.65)); }
        }
    </style>
</head>
<body>

    <!-- Left sidebar containing WC Logo and Jett -->

    <div class="corner-accent tl">

            <path d="M3,36 L3,3 L36,3" stroke="#9b51e0" stroke-width="3.5" stroke-linecap="square"/>

            <path d="M9,44 L9,9 L44,9" stroke="rgba(155, 81, 224, 0.4)" stroke-width="1.5" stroke-linecap="square"/>

            <circle cx="22" cy="22" r="2" fill="#00f3c6"/>
        </svg>
    </div>
    <div class="corner-accent br">
        <svg width="100%" height="100%" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">

            <path d="M9,44 L9,9 L44,9" stroke="rgba(155, 81, 224, 0.4)" stroke-width="1.5" stroke-linecap="square"/>
            <rect x="8" y="8" width="6" height="6" fill="#ece81a" rx="1"/>
            <rect x="2" y="2" width="2" height="2" fill="#00f3c6"/>
            <line x1="3" y1="3" x2="22" y2="22" stroke="rgba(255, 255, 255, 0.15)" stroke-width="1.5" stroke-dasharray="2 2"/>
            <circle cx="22" cy="22" r="2" fill="#00f3c6"/>
        </svg>
    </div>

    <!-- Center Content Section -->
    <div class="center-content">
        <!-- Center shield Logo -->
        <img src="/assets/wvps logo.png" class="tournament-logo-large" alt="WVPS Shield Logo" onerror="this.src='/assets/wvps logo.png'">

        <!-- Center Typography ending style -->
        <div class="text-stream">STREAM</div>
        <div class="text-state">ENDED</div>

        <!-- Skewed Goodbye Box -->
        <div class="goodbye-box">
            <!-- Skewed Box corner brackets -->
            <div class="box-corner tl"><svg width="100%" height="100%" viewBox="0 0 20 20" fill="none"><path d="M2,12 L2,2 L12,2" stroke="#ece81a" stroke-width="2.5" stroke-linecap="square"/></svg></div>
            <div class="box-corner tr"><svg width="100%" height="100%" viewBox="0 0 20 20" fill="none"><path d="M2,12 L2,2 L12,2" stroke="#ece81a" stroke-width="2.5" stroke-linecap="square"/></svg></div>
            <div class="box-corner bl"><svg width="100%" height="100%" viewBox="0 0 20 20" fill="none"><path d="M2,12 L2,2 L12,2" stroke="#ece81a" stroke-width="2.5" stroke-linecap="square"/></svg></div>
            <div class="box-corner br"><svg width="100%" height="100%" viewBox="0 0 20 20" fill="none"><path d="M2,12 L2,2 L12,2" stroke="#ece81a" stroke-width="2.5" stroke-linecap="square"/></svg></div>

            <div class="goodbye-text" id="goodbye-message">Thanks For Watching The Stream</div>
        </div>

        <!-- Social Grid Row -->
        <div class="socials-grid">
            <div class="social-card">
                <svg viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                <span class="social-title">Facebook</span>
                <span class="social-handle">warcities</span>
            </div>
            <div class="social-card">
                <svg viewBox="0 0 24 24"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.873-.894.077.077 0 0 1-.008-.128c.126-.093.252-.19.372-.287a.075.075 0 0 1 .077-.011c3.92 1.793 8.18 1.793 12.061 0a.073.073 0 0 1 .078.009c.12.099.246.195.373.289a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.894.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.156 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.156-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.156 2.418z"/></svg>

        <!-- Scrolling partners strip -->
        <div class="bottom-partners">
            <img src="/assets/Warcities logo.png" class="partner-logo" alt="Sponsor">
            <img src="/assets/Valorant Logo.png" class="partner-logo" alt="Sponsor">
            <img src="/assets/wvps logo.png" class="partner-logo" alt="Sponsor">
        </div>
    </div>

    <script>
        const wsProto = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const ws = new WebSocket(`${wsProto}//${location.host}`);
        let state = null;

        function deepMerge(target, src) {
            if (!src || typeof src !== 'object') return;
            for (const key of Object.keys(src)) {
                const srcVal = src[key];
                const tgtVal = target[key];
                if (Array.isArray(srcVal)) {
                    target[key] = srcVal;
                } else if (srcVal && typeof srcVal === 'object') {
                    if (!tgtVal || typeof tgtVal !== 'object') target[key] = {};
                    deepMerge(target[key], srcVal);
                } else {
                    target[key] = srcVal;
                }
            }
        }

        ws.onmessage = (event) => {
            try {
                const patch = JSON.parse(event.data);
                if (!patch) return;

                if (!state) {
                    state = patch;
                } else {
                    deepMerge(state, patch);
                }
                render();
            } catch (err) {
                console.error('[WS] Error processing message:', err);
            }
        };

        ws.onopen = () => console.log('[WS] Connected to Stream Ending Overlay');
        ws.onclose = () => setTimeout(() => location.reload(), 3000);

        function render() {
            if (!state) return;

            const endMessage = state.endMessage || 'Thanks For Watching The Stream';
            document.getElementById('goodbye-message').textContent = endMessage;
        }
    </script>
</body>
