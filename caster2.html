<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ValorGG // Professional Broadcast Caster Desk</title>
    <!-- Premium Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="caster2.css">
</head>
<body>

    <!-- Holographic scanline and noise vignette overlay for high-end broadcast aesthetic -->
    <div class="broadcast-overlay-fx"></div>

    <div class="caster-wrapper">
        
        <!-- TOP BROADCAST HEADER (Futuristic floating dashboard bar) -->
        <header class="caster-header animate-header">
            <div class="header-logo-left">
                <img src="assets/Warcities logo.png" alt="Warcities Logo">
            </div>
            
            <div class="header-center-info">
                <h1 class="v-event" id="header-tournament">WARCITIES // VALORANT PRO SERIES</h1>
                <div class="header-scene">
                    <span class="scene-glow-dot"></span>
                    <span class="scene-label">CASTER DESK</span>
                </div>
            </div>

            <div class="header-logo-right">
                <img src="assets/wvps logo.png" alt="WVPS Logo">
            </div>
        </header>

        <!-- CENTER DISPLAY ZONE -->
        <main class="caster-viewport">
            
            <!-- Holographic background grid lines and rings for visual depth -->
            <div class="bg-hologram-grid"></div>
            <div class="bg-cyber-rings">
                <div class="ring ring-outer"></div>
                <div class="ring ring-inner"></div>
            </div>

            <!-- Main Caster Cards Container -->
            <div class="caster-grid-container" id="caster-container">
                <!-- Two ultra premium custom designed caster panels will be dynamically injected here -->
            </div>
            
        </main>

        <!-- DUAL-STAGE RUNNING METRIC FOOTER -->
        <footer class="caster-footer">
            <div class="footer-sidebar">
                <div class="footer-logo">LIVE</div>
                <div class="footer-label">HEADLINES</div>
            </div>
            
            <div class="ticker-column">
                <div class="ticker-wrap">
                    <div class="ticker-scroll" id="ticker-scroll">
                        <!-- Dynamic single-line marquee content will be injected here -->
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script src="caster2.js"></script>
</body>
</html>
